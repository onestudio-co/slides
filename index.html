<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Studio — Presentations</title>
<meta name="description" content="Private presentations and interactive decks by One Studio.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #060a1f;
    --bg-primary: #0a0e27;
    --border: rgba(255,255,255,0.06);
    --text-primary: #e8eaf0;
    --text-secondary: #8a8fa8;
    --text-muted: #4a4f6a;
    --cyan: #00d4ff;
    --gold: #ffd700;
    --emerald: #00c48c;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ── Animated Background ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 50% at 50% 40%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 70% 50% at 50% 40%, black 20%, transparent 70%);
  }

  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    animation: orb-drift 25s ease-in-out infinite alternate;
  }
  .bg-orb--cyan {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.07), transparent 70%);
    top: -15%; right: -10%;
    animation-delay: 0s;
  }
  .bg-orb--gold {
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(255,215,0,0.04), transparent 70%);
    bottom: -5%; left: -12%;
    animation-delay: -8s;
  }
  .bg-orb--emerald {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,196,140,0.04), transparent 70%);
    top: 55%; left: 50%;
    animation-delay: -16s;
  }

  @keyframes orb-drift {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(40px, -25px) scale(1.06); }
    50%  { transform: translate(-15px, 20px) scale(0.94); }
    75%  { transform: translate(25px, -10px) scale(1.03); }
    100% { transform: translate(-10px, 15px) scale(0.98); }
  }

  /* ── Page Layout ── */
  .page {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    min-height: 100vh;
  }

  .content {
    text-align: center;
    max-width: 560px;
  }

  /* ── Logo ── */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 48px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    border: 2px solid var(--cyan);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 25px rgba(0,212,255,0.15), inset 0 0 12px rgba(0,212,255,0.05);
  }
  .logo-mark::before {
    content: '';
    width: 14px; height: 14px;
    background: var(--cyan);
    border-radius: 3px;
    box-shadow: 0 0 12px var(--cyan);
  }

  .logo-text {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }
  .logo-text span {
    color: var(--cyan);
  }

  /* ── Divider ── */
  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 0 auto 40px;
    opacity: 0.4;
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border);
    display: inline-block;
    padding: 8px 20px;
    border-radius: 4px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 56px;
  }

  /* ── Message ── */
  .message {
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .message-hint {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── Footer ── */
  .footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 28px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .footer-line {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .footer-line a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-line a:hover { color: var(--cyan); }

  .footer-nala {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    opacity: 0.5;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .logo-text { font-size: 1.6rem; }
    .logo-mark { width: 40px; height: 40px; }
    .logo-mark::before { width: 12px; height: 12px; }
    .logo { gap: 10px; margin-bottom: 36px; }
    .tagline { font-size: 0.68rem; padding: 6px 16px; margin-bottom: 44px; }
    .message { font-size: 0.95rem; }
    .divider { margin-bottom: 32px; }
  }
</style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb--cyan"></div>
  <div class="bg-orb bg-orb--gold"></div>
  <div class="bg-orb bg-orb--emerald"></div>
</div>

<main class="page">
  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">One <span>Studio</span></div>
    </div>

    <div class="divider"></div>

    <div class="tagline">Presentations &amp; Interactive Decks</div>

    <p class="message">Looking for a specific presentation?<br>Check the link shared with you.</p>
    <p class="message-hint">Each deck has its own private URL.</p>
  </div>
</main>

<footer class="footer">
  <div class="footer-line"><a href="#">one-studio.co</a></div>
  <div class="footer-nala">Powered by Nala (&#x0646;&#x0627;&#x0644;&#x0627;)</div>
  <div class="footer-line">&copy; 2026</div>
</footer>

</body>
</html>
